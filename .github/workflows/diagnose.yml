name: LLM API 動作診断 (週次)

on:
  schedule:
    # 毎週月曜 9:00 JST（日曜 24:00 UTC）
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: llm-api-diagnostics
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Preview モデル一覧を内部的に最新化
        id: refresh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true
        run: python scripts/update_preview_models.py

      - name: 全モデルに対して短文生成テストを実行
        id: diag
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -uo pipefail
          mkdir -p logs
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +'%H:%M:%S %Z')
          LOGFILE="logs/${DATE}.md"

          IS_NEW=0
          [ -f "$LOGFILE" ] || IS_NEW=1

          {
            if [ "$IS_NEW" = "1" ]; then
              echo "# ${DATE} モデル診断ログ"
              echo
            fi
            echo "## ${TIME}"
            echo
            echo '```'
          } >> "$LOGFILE"

          set +e
          python gemini/model_checker.py 2>&1 | tee -a "$LOGFILE"
          STATUS=${PIPESTATUS[0]}
          set -e

          {
            echo '```'
            echo
          } >> "$LOGFILE"

          if [ "$STATUS" -ne 0 ]; then
            echo "**診断ステータス**: 失敗 (exit $STATUS)" >> "$LOGFILE"
          else
            echo "**診断ステータス**: 正常終了" >> "$LOGFILE"
          fi
          echo >> "$LOGFILE"

          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "script_status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: PR を作成して auto-merge を有効化
        if: always() && steps.diag.outcome != 'cancelled'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "変更なし。PR 作成スキップ。"
            exit 0
          fi

          DATE="${{ steps.diag.outputs.date }}"
          BRANCH="auto/diag-${DATE}-${GITHUB_RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "診断ログと preview 一覧を更新 (${DATE})"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "Gemini API 動作診断ログ (${DATE})" \
            --body "$(cat <<'EOF'
          ## 概要

          GitHub Actions が全モデルに対して `generate_content` で短文生成テストを実行し、
          各モデルの応答状況を `logs/` に保存しました。必要に応じて
          `gemini/model_checker.py` の Preview モデル一覧も最新化されています。

          CI 成功後に auto-merge が発火します。

          ## 参照

          `logs/` ディレクトリの対応する日付ファイルに、各モデルの結果と Summary テーブルが含まれます。
          EOF
          )")

          gh pr merge "$PR_URL" --auto --merge --delete-branch

      - name: 診断スクリプトが失敗していればジョブも失敗にする
        if: always() && steps.diag.outputs.script_status != '0'
        run: |
          echo "model_checker.py が失敗しました (exit ${{ steps.diag.outputs.script_status }})"
          exit 1
