name: Preview モデル一覧の自動更新

on:
  schedule:
    # 毎週月曜 9:00 JST（日曜 24:00 UTC）
    - cron: "0 0 * * 1"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-preview-models
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Preview モデル一覧を取得・更新
        id: run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -uo pipefail
          mkdir -p logs
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +'%H:%M:%S %Z')
          LOGFILE="logs/${DATE}.md"

          {
            if [ ! -f "$LOGFILE" ]; then
              echo "# ${DATE} 実行ログ"
              echo
            fi
            echo "## ${TIME}"
            echo
            echo '```'
          } >> "$LOGFILE"

          set +e
          python scripts/update_preview_models.py 2>&1 | tee -a "$LOGFILE"
          STATUS=${PIPESTATUS[0]}
          set -e

          {
            echo '```'
            echo
          } >> "$LOGFILE"

          if [ "$STATUS" -ne 0 ]; then
            echo "**ステータス**: 失敗 (exit $STATUS)" >> "$LOGFILE"
          elif git diff --quiet gemini/model_checker.py; then
            echo "**ステータス**: 成功（差分なし）" >> "$LOGFILE"
          else
            echo "**ステータス**: 成功（model_checker.py に差分あり → PR 作成）" >> "$LOGFILE"
          fi

          echo >> "$LOGFILE"

          echo "logfile=$LOGFILE" >> "$GITHUB_OUTPUT"
          echo "script_status=$STATUS" >> "$GITHUB_OUTPUT"

          # Python 失敗時はステップを失敗にする（ログ保存ステップは if: always() で走る）
          exit $STATUS

      - name: ログを main にコミット
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain logs/)" ]; then
            echo "logs/ に変更なし。スキップ。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git commit -m "ci: add execution log"

          # 競合回避: 最新の main に対して rebase してから push
          # 作業ツリーに未 stage な変更があっても autostash で扱う
          git fetch origin main
          git rebase --autostash origin/main
          git push origin HEAD:main

      - name: model_checker.py に差分があれば PR 作成
        if: steps.run.outputs.script_status == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if git diff --quiet gemini/model_checker.py; then
            echo "model_checker.py 変更なし。PR 作成スキップ。"
            exit 0
          fi

          BRANCH="auto/update-preview-models"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add gemini/model_checker.py
          git commit -m "Preview モデル一覧を自動更新"

          # --force-with-lease が remote-tracking ref を必要とするため、
          # リモートに既存のブランチがあれば先に fetch しておく
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH":"refs/remotes/origin/$BRANCH"
          fi
          git push --force-with-lease origin "$BRANCH"

          EXISTING_COUNT=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')
          if [ "${EXISTING_COUNT:-0}" -gt 0 ]; then
            echo "既存 PR あり（${EXISTING_COUNT} 件）。作成はスキップ。"
          else
            gh pr create \
              --title "Preview モデル一覧を自動更新" \
              --body "$(cat <<'EOF'
          ## 概要

          GitHub Actions が Gemini API（v1beta / v1）を比較し、
          Preview モデルの追加・廃止を検出して `model_checker.py` を更新しました。

          マージ前に差分を確認してください。

          ## 実行ログ

          `logs/` ディレクトリの対応する日付ファイルを参照してください。
          EOF
          )"
          fi
