name: Preview モデル一覧の自動更新

on:
  schedule:
    # 毎週月曜 9:00 JST（日曜 24:00 UTC）
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-preview-models
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Preview モデル一覧を取得・更新
        id: run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -uo pipefail
          mkdir -p logs
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +'%H:%M:%S %Z')
          LOGFILE="logs/${DATE}.md"

          IS_NEW=0
          [ -f "$LOGFILE" ] || IS_NEW=1

          {
            if [ "$IS_NEW" = "1" ]; then
              echo "# ${DATE} 実行ログ"
              echo
            fi
            echo "## ${TIME}"
            echo
            echo '```'
          } >> "$LOGFILE"

          set +e
          python scripts/update_preview_models.py 2>&1 | tee -a "$LOGFILE"
          STATUS=${PIPESTATUS[0]}
          set -e

          {
            echo '```'
            echo
          } >> "$LOGFILE"

          if [ "$STATUS" -ne 0 ]; then
            echo "**ステータス**: 失敗 (exit $STATUS)" >> "$LOGFILE"
          elif git diff --quiet gemini/model_checker.py; then
            echo "**ステータス**: 成功（差分なし）" >> "$LOGFILE"
          else
            echo "**ステータス**: 成功（model_checker.py に差分あり）" >> "$LOGFILE"
          fi

          echo >> "$LOGFILE"

          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "script_status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: PR を作成して auto-merge を有効化
        if: always() && steps.run.outcome != 'cancelled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "変更なし。PR 作成スキップ。"
            exit 0
          fi

          DATE="${{ steps.run.outputs.date }}"
          BRANCH="auto/run-${DATE}-${GITHUB_RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Preview モデル一覧と実行ログを更新 (${DATE})"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "Preview モデル一覧・実行ログを自動更新 (${DATE})" \
            --body "$(cat <<'EOF'
          ## 概要

          GitHub Actions が Gemini API（v1beta / v1）を比較し、
          Preview モデルの追加・廃止および実行ログを反映しました。

          CI 成功後に auto-merge が発火します。

          ## 実行ログ

          `logs/` ディレクトリの対応する日付ファイルを参照してください。
          EOF
          )")

          gh pr merge "$PR_URL" --auto --merge --delete-branch

      - name: スクリプト失敗時はジョブも失敗にする
        if: always() && steps.run.outputs.script_status != '0'
        run: |
          echo "update_preview_models.py が失敗しました (exit ${{ steps.run.outputs.script_status }})"
          exit 1
